name: helpflow
description: "HelpFlow - 고객 지원 티켓 관리 시스템"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 로컬 데이터베이스
  hive_flutter: ^1.1.0

  # 라우팅
  go_router: ^14.2.7

  # 아이콘
  material_symbols_icons: ^4.2719.1

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # 차트 (7~8주차 활성화 예정)
  # fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성 도구
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
